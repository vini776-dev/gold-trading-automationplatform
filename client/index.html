<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GTAP - Gold Trading Automation Platform</title>
  <!-- Typography & Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  
  <!-- CSS Stylesheets -->
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
  
  <!-- Chart.js & Socket.IO Client from CDNs -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/socket.io-client@4.7.2/dist/socket.io.min.js"></script>
</head>
<body>

  <!-- Server Offline Overlay -->
  <div id="offline-overlay" class="offline-overlay">
    <div class="card" style="text-align: center; max-width: 400px; padding: 2.5rem;">
      <i class="fa-solid fa-triangle-exclamation" style="font-size: 3rem; color: var(--color-danger); margin-bottom: 1.5rem;"></i>
      <h2 style="margin-bottom: 1rem;">Connection Lost</h2>
      <p style="color: var(--color-text-secondary); margin-bottom: 2rem;">Unable to reach the server. Please check your connection.</p>
      <button id="reconnect-btn" class="btn btn-primary"><i class="fa-solid fa-rotate-right" style="margin-right: 0.5rem;"></i> Retry Connection</button>
    </div>
  </div>

  <!-- Toast Notification Container -->
  <div id="toast-container" class="toast-container"></div>

  <!-- Auth / Login Screen Overlay -->
  <div id="auth-overlay" class="auth-overlay"></div>

  <!-- SPA Admin Shell Layout -->
  <div id="app-shell" class="app-container" style="display: none;">
    <!-- Sidebar Navigation -->
    <aside class="sidebar">
      <div class="brand">
        <i class="fa-solid fa-coins"></i>
        <span>GTAP</span>
      </div>
      <nav style="flex-grow: 1;">
        <ul class="sidebar-nav">
          <li data-link="dashboard"><a href="#/dashboard"><i class="fa-solid fa-chart-line"></i> Dashboard</a></li>
          <li data-link="trades"><a href="#/trades"><i class="fa-solid fa-right-left"></i> Trades</a></li>
          <li data-link="reports"><a href="#/reports"><i class="fa-solid fa-file-invoice-dollar"></i> Reports</a></li>
          <li data-link="settings"><a href="#/settings"><i class="fa-solid fa-gears"></i> Settings</a></li>
          <li><a href="monitor.html" target="_blank" style="color:#a78bfa;" title="Live Strategy Monitor">
            <i class="fa-solid fa-satellite-dish"></i> Live Monitor
          </a></li>
        </ul>
      </nav>
      <ul class="sidebar-nav" style="flex-grow: 0;">
        <li><a href="#" id="logout-link" style="color: var(--color-danger);"><i class="fa-solid fa-power-off"></i> Logout</a></li>
      </ul>
    </aside>

    <!-- Main Content Panel -->
    <div class="main-panel">
      <!-- Header Bar -->
      <header class="header">
        <div class="header-left">
          <h2 id="page-title">Dashboard</h2>
        </div>
        <div class="header-right">
          <!-- Engine Heartbeat status indicator -->
          <div class="engine-status-badge">
            <span>Trading Engine:</span>
            <div id="engine-status-dot" class="status-dot offline"></div>
            <span id="engine-status-text" style="color: var(--color-text-secondary);">OFFLINE</span>
          </div>
          <!-- Profile dropdown info -->
          <div id="profile-container" style="font-weight: 600; display: flex; align-items: center; gap: 0.5rem;">
            <i class="fa-solid fa-user-circle" style="font-size: 1.5rem;"></i>
            <span id="username-display">Trader</span>
          </div>
        </div>
      </header>

      <!-- Main Outlet -->
      <main id="content-outlet"></main>
    </div>
  </div>

  <!-- Bootstrapping Script -->
  <script type="module" src="js/app.js"></script>
</body>
</html>
